name: Build Technologies Soft to EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # تثبيت التبعيات مع البناء من المصدر (لبناء better-sqlite3)
      - name: Install dependencies with build
        run: npm install --build-from-source
        env:
          msvs_version: 2022
          npm_config_target: 30.0.0
          npm_config_arch: x64
          npm_config_target_arch: x64
          npm_config_disturl: https://electronjs.org/headers
          npm_config_runtime: electron
          npm_config_build_from_source: true
          npm_config_fallback_to_build: true

      # (اختياري) تثبيت Visual Studio Build Tools للتأكيد
      - name: Install Visual Studio Build Tools (if needed)
        run: |
          choco install visualstudio2022buildtools -y
          choco install visualstudio2022-workload-vctools -y
        continue-on-error: true

      # تحميل الخطوط العربية
      - name: Download Arabic fonts
        run: |
          mkdir -p assets/fonts
          curl -L -o assets/fonts/Tajawal-Regular.ttf https://github.com/google/fonts/raw/main/ofl/tajawal/Tajawal-Regular.ttf || echo "تنبيه: فشل تنزيل Tajawal-Regular"
          curl -L -o assets/fonts/Tajawal-Bold.ttf https://github.com/google/fonts/raw/main/ofl/tajawal/Tajawal-Bold.ttf || echo "تنبيه: فشل تنزيل Tajawal-Bold"
          curl -L -o assets/fonts/Roboto-Regular.ttf https://github.com/google/fonts/raw/main/ofl/roboto/Roboto-Regular.ttf || echo "تنبيه: فشل تنزيل Roboto-Regular"
          curl -L -o assets/fonts/Roboto-Medium.ttf https://github.com/google/fonts/raw/main/ofl/roboto/Roboto-Medium.ttf || echo "تنبيه: فشل تنزيل Roboto-Medium"
          curl -L -o assets/fonts/Roboto-Italic.ttf https://github.com/google/fonts/raw/main/ofl/roboto/Roboto-Italic.ttf || echo "تنبيه: فشل تنزيل Roboto-Italic"
          curl -L -o assets/fonts/Roboto-MediumItalic.ttf https://github.com/google/fonts/raw/main/ofl/roboto/Roboto-MediumItalic.ttf || echo "تنبيه: فشل تنزيل Roboto-MediumItalic"
        continue-on-error: true

      # التأكد من وجود الأيقونة (إنشاء مؤقت إن لم تكن موجودة)
      - name: Ensure icon exists
        run: |
          if not exist "assets\icon.ico" (
            echo "⚠️ ملف icon.ico غير موجود، سيتم إنشاء ملف مؤقت"
            echo "Creating placeholder icon..." > assets\icon.ico
          )

      # بناء المثبت باستخدام electron-builder
      - name: Build EXE Installer
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
          msvs_version: 2022
          npm_config_target: 30.0.0
          npm_config_arch: x64
          npm_config_target_arch: x64
          npm_config_disturl: https://electronjs.org/headers
          npm_config_runtime: electron
          npm_config_build_from_source: true
          npm_config_fallback_to_build: true

      # رفع الملف الناتج كـ artifact
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: technologies-soft-installer
          path: dist/*.exe
          retention-days: 30

      # إنشاء إصدار (Release) تلقائي
      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "تقنيات سوفت - إصدار ${{ github.run_number }}"
          files: dist/*.exe
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
